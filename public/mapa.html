<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa de usuarios | AgroConecta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="hero">
    <nav class="topbar">
      <div class="brand">AgroConecta</div>
      <div class="topbar-links">
        <a class="cta-link" href="./index.html">Inicio</a>
      </div>
    </nav>

    <section class="hero-content">
      <p class="kicker">Visualizacion de ubicaciones</p>
      <h1>Mapa de usuarios registrados</h1>
      <p class="subtitle">Visualiza productores y consumidores que compartieron su ubicacion en registro.</p>
    </section>
  </header>

  <main class="layout">
    <section class="panel" style="grid-column: 1 / -1;">
      <div class="panel-header">
        <h2>Ubicaciones de AgroConecta</h2>
        <p id="map-status">Cargando ubicaciones...</p>
      </div>
      <div id="map" style="height: 520px; border-radius: 14px; margin-top: 1rem;"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="./mapa.js" defer></script>
</body>
</html>
